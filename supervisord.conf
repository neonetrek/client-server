[supervisord]
nodaemon=true
logfile=/var/log/supervisord.log
pidfile=/var/run/supervisord.pid

[include]
files = /etc/supervisor/conf.d/instances.conf

[program:ws-proxy]
command=node /opt/ws-proxy/index.js
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
environment=NETREK_HOST="127.0.0.1",NETREK_PORT="2592",WS_PORT="%(ENV_WS_PORT)s",STATIC_DIR="/opt/web-client",PORTAL_DIR="/opt/portal",NEONETREK_CONFIG="/opt/config.json"
priority=30
