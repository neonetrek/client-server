<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NeoNetrek</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <script defer src="https://cloud.umami.is/script.js" data-website-id="0929afc4-70d5-4bad-b848-a437477f3212"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      color: #0f0;
      font-family: 'Courier New', monospace;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
      /* CRT phosphor glow on all text */
      text-shadow: 0 0 4px currentColor;
    }
    #app {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      filter: contrast(1.1) brightness(1.02);
    }
    canvas {
      image-rendering: pixelated;
    }
    #tactical-wrap {
      position: relative;
    }
    #status {
      position: absolute;
      bottom: 4px;
      left: 8px;
      font-size: 11px;
      color: #888;
      z-index: 100;
    }

    /* CRT scanlines overlay — covers entire app */
    #app::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg, rgba(0,0,0,0.15) 0px, rgba(0,0,0,0.15) 1px,
        transparent 1px, transparent 3px
      );
      pointer-events: none;
      z-index: 1000;
    }

    /* 4-panel layout */
    #map-row {
      display: flex;
      flex-direction: row;
      justify-content: center;
    }
    /* Divider between tactical and galactic */
    #tactical {
      border-right: 1px solid #333;
    }
    /* Vignette on canvases */
    canvas {
      box-shadow: inset 0 0 60px rgba(0,0,0,0.5);
    }

    #status-bar {
      height: 32px;
      display: flex;
      align-items: center;
      padding: 0 8px;
      gap: 12px;
      background: #0a0a0a;
      border-top: 1px solid #333;
      border-bottom: 1px solid #333;
      font-size: 11px;
      font-family: monospace;
      color: #0f0;
      overflow: hidden;
      flex-shrink: 0;
    }
    .hud-group {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .hud-label {
      color: #888;
      font-size: 10px;
      width: 20px;
    }
    .hud-bar {
      width: 80px;
      height: 8px;
      background: #222;
      position: relative;
    }
    .hud-bar-fill {
      display: block;
      height: 100%;
      transition: width 0.1s;
      box-shadow: 0 0 6px currentColor;
    }
    .hud-value {
      color: #ccc;
      font-size: 10px;
      min-width: 36px;
    }
    .hud-text {
      color: #0f0;
      font-size: 11px;
    }
    .hud-flags {
      color: #ff0;
      font-size: 10px;
    }
    .hud-lag {
      font-size: 10px;
    }
    .hud-sep {
      color: #333;
    }

    #bottom-row {
      display: flex;
      flex-direction: row;
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }

    #player-list {
      width: 50%;
      overflow-y: auto;
      background: #050505;
      border-right: 1px solid #333;
      font-family: monospace;
      font-size: 11px;
    }
    #player-list table {
      width: 100%;
      border-collapse: collapse;
    }
    #player-list th {
      position: sticky;
      top: 0;
      background: #111;
      color: #888;
      text-align: left;
      padding: 2px 6px;
      font-weight: normal;
      font-size: 10px;
      border-bottom: 1px solid #222;
    }
    #player-list td {
      padding: 1px 6px;
      white-space: nowrap;
    }

    #message-panel {
      width: 50%;
      overflow-y: auto;
      background: #050505;
      font-family: monospace;
      font-size: 11px;
      padding: 4px 8px;
    }
    .msg-line {
      line-height: 1.4;
    }
    .msg-all { color: #0f0; }
    .msg-team { color: #ff0; }
    .msg-individual { color: #0cf; }
    .msg-god { color: #f44; }
    .msg-kill { color: #f80; }
    .msg-take { color: #f0f; }
    .msg-system { color: #888; }
  </style>
</head>
<body>
  <div id="app">
    <div id="map-row">
      <div id="tactical-wrap">
        <canvas id="tactical"></canvas>
        <div id="status">Connecting...</div>
      </div>
      <canvas id="galactic"></canvas>
    </div>
    <div id="status-bar"></div>
    <div id="bottom-row">
      <div id="player-list"></div>
      <div id="message-panel"></div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
