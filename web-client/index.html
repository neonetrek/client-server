<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NeoNetrek</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      color: #0f0;
      font-family: 'Courier New', monospace;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
    }
    #app {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
    }
    #tactical-wrap {
      position: relative;
    }
    #status {
      position: absolute;
      bottom: 4px;
      left: 8px;
      font-size: 11px;
      color: #888;
      z-index: 100;
    }

    /* 4-panel layout */
    #map-row {
      display: flex;
      flex-direction: row;
      justify-content: center;
      align-items: flex-start;
    }
    /* Divider between tactical and galactic */
    #tactical {
      border-right: 1px solid #333;
    }
    /* Overlay canvas for 2D text on top of WebGL tactical */
    #tactical-overlay {
      position: absolute;
      top: 0;
      left: 0;
      pointer-events: none;
      z-index: 5;
    }
    /* CSS2D label container */
    #tactical-labels {
      position: absolute;
      top: 0;
      left: 0;
      pointer-events: none;
      z-index: 4;
      overflow: hidden;
    }

    /* Galactic CSS2D label container */
    #galactic-wrap {
      position: relative;
      overflow: hidden;
    }
    #galactic-labels {
      position: absolute;
      top: 0;
      left: 0;
      pointer-events: none;
      z-index: 4;
      overflow: hidden;
    }

    #status-bar {
      height: 32px;
      display: flex;
      align-items: center;
      padding: 0 8px;
      gap: 12px;
      background: #0a0a0a;
      border-top: 1px solid #333;
      border-bottom: 1px solid #333;
      font-size: 11px;
      font-family: monospace;
      color: #0f0;
      overflow: hidden;
      flex-shrink: 0;
    }
    .hud-group {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .hud-label {
      color: #888;
      font-size: 10px;
      width: 20px;
    }
    .hud-bar {
      width: 80px;
      height: 8px;
      background: #222;
      position: relative;
    }
    .hud-bar-fill {
      display: block;
      height: 100%;
      transition: width 0.1s;
      box-shadow: 0 0 6px currentColor;
    }
    .hud-value {
      color: #ccc;
      font-size: 10px;
      min-width: 36px;
    }
    .hud-text {
      color: #0f0;
      font-size: 11px;
    }
    .hud-flags {
      color: #ff0;
      font-size: 10px;
    }
    .hud-lag {
      font-size: 10px;
    }
    .hud-sep {
      color: #333;
    }

    #bottom-row {
      display: flex;
      flex-direction: row;
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }

    #player-list {
      width: 50%;
      overflow-y: auto;
      background: #050505;
      border-right: 1px solid #333;
      font-family: monospace;
      font-size: 11px;
    }
    #player-list table {
      width: 100%;
      border-collapse: collapse;
    }
    #player-list th {
      position: sticky;
      top: 0;
      background: #111;
      color: #888;
      text-align: left;
      padding: 2px 6px;
      font-weight: normal;
      font-size: 10px;
      border-bottom: 1px solid #222;
    }
    #player-list td {
      padding: 1px 6px;
      white-space: nowrap;
    }

    #message-panel {
      width: 50%;
      overflow-y: auto;
      background: #050505;
      font-family: monospace;
      font-size: 11px;
      padding: 4px 8px;
    }
    .msg-line {
      line-height: 1.4;
    }
    .msg-all { color: #0f0; }
    .msg-team { color: #ff0; }
    .msg-individual { color: #0cf; }
    .msg-god { color: #f44; }
    .msg-kill { color: #f80; }
    .msg-take { color: #f0f; }
    .msg-system { color: #888; }

    /* Login form overlay — CRT-styled, positioned at bottom of tactical canvas */
    .login-overlay {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(0, 0, 0, 0.85);
      border: 1px solid #0a0;
      padding: 10px 16px;
      border-radius: 2px;
      box-shadow: 0 0 12px rgba(0, 255, 0, 0.15);
    }
    .login-label {
      color: #0a0;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      text-shadow: 0 0 4px #0a0;
    }
    .login-overlay input {
      background: #050505;
      border: 1px solid #0a0;
      color: #0f0;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      padding: 4px 6px;
      width: 120px;
      outline: none;
      text-shadow: 0 0 4px #0f0;
      box-shadow: inset 0 0 6px rgba(0, 255, 0, 0.1);
    }
    .login-overlay input:focus {
      border-color: #0f0;
      box-shadow: inset 0 0 6px rgba(0, 255, 0, 0.2), 0 0 8px rgba(0, 255, 0, 0.2);
    }
    .login-overlay input::placeholder {
      color: #363;
    }
    .login-submit {
      background: #0a0;
      color: #000;
      border: none;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      font-weight: bold;
      padding: 4px 12px;
      cursor: pointer;
      text-shadow: none;
      box-shadow: 0 0 8px rgba(0, 255, 0, 0.3);
    }
    .login-submit:hover {
      background: #0f0;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="map-row">
      <div id="tactical-wrap">
        <canvas id="tactical"></canvas>
        <canvas id="tactical-overlay"></canvas>
        <div id="tactical-labels"></div>
        <div id="status">Connecting...</div>
        <form id="login-form" class="login-overlay" autocomplete="on" style="display: none;">
          <label for="login-name" class="login-label">Name:</label>
          <input id="login-name" type="text" name="username" autocomplete="username"
                 maxlength="15" spellcheck="false" placeholder="guest" />
          <label for="login-password" class="login-label">Password:</label>
          <input id="login-password" type="password" name="password" autocomplete="current-password"
                 maxlength="15" />
          <button type="submit" class="login-submit">Login</button>
        </form>
      </div>
      <div id="galactic-wrap" style="position: relative;">
        <canvas id="galactic"></canvas>
        <div id="galactic-labels"></div>
      </div>
    </div>
    <div id="status-bar"></div>
    <div id="bottom-row">
      <div id="player-list"></div>
      <div id="message-panel"></div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
