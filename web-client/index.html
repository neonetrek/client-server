<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NeoNetrek</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      color: #0f0;
      font-family: 'Courier New', monospace;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
    }
    #app {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    canvas {
      image-rendering: pixelated;
    }
    #status {
      position: fixed;
      top: 8px;
      left: 8px;
      font-size: 12px;
      color: #888;
      z-index: 100;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="status">Connecting...</div>
    <canvas id="tactical"></canvas>
    <canvas id="galactic" style="display:none;"></canvas>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
